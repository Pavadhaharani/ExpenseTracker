# ===================================================================
# Application
# ===================================================================
spring.application.name=expense-tracker-backend
server.port=8080

# All REST endpoints are served under /api  (e.g. /api/auth/login)
server.servlet.context-path=/api

# Active Spring profile — switch to 'prod' for production
spring.profiles.active=dev

# ===================================================================
# CORS
# ===================================================================
app.cors.allowed-origins=http://localhost:4200

# ===================================================================
# JWT
# ===================================================================
# IMPORTANT: Replace with a cryptographically random Base64-encoded
# 256-bit (or longer) secret before deploying to production.
# Generate one with: openssl rand -base64 64
app.jwt.secret=ZXhwZW5zZVRyYWNrZXJTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjIwMjRAU3ByaW5nQm9vdDM=
# Token validity: 24 hours (86 400 000 ms)
app.jwt.expiration-ms=86400000

# ===================================================================
# Logging
# ===================================================================
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
