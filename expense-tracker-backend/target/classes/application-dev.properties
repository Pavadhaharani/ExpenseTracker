# ===================================================================
# Dev Profile — MySQL 8 local instance
# ===================================================================

# ── Datasource ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Pava@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP defaults are usually fine for dev)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ── JPA / Hibernate ─────────────────────────────────────────────────
# 'update' creates or alters tables automatically — convenient for dev.
# Switch to 'validate' or 'none' in production (use Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── SQL Initialisation (data.sql seed file) ─────────────────────────
# Run data.sql after Hibernate has finished creating/updating the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
