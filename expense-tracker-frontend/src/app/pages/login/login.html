<section class="auth-page">
  <mat-card class="auth-card">
    <div class="auth-brand">
      <mat-icon>account_balance_wallet</mat-icon>
      <div>
        <h1>Welcome back</h1>
        <p>Sign in to manage expenses and reports.</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Username or email</mat-label>
        <input matInput formControlName="usernameOrEmail" autocomplete="username" />
        <mat-error>Username or email is required.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
        <mat-error>Password is required.</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit">Login</button>
    </form>

    <p class="switch">New here? <a routerLink="/register">Create an account</a></p>
  </mat-card>
</section>
